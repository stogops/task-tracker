
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-tracker
  namespace: os-stogops-wrk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-tracker
  template:
    metadata:
      labels:
        app: task-tracker
    spec:
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: task-tracker
        image: us-central1-docker.pkg.dev/operative-001/os-stogops/os/stogops/task-tracker:latest
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
